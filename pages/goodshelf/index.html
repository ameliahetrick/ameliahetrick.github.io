<style type="text/css">

  :root {
    --background-boxes-color: #fff;
    
    --book-height: 150px; /* og height: 160px */
    --book-width: 94px; /* og width: 100px */
    
    --sidebar-width: 250px;
    --tab-height: 25px;
    --padding-size: 10px;
    
    --container-height: calc((3*var(--book-height)) + (4*var(--padding-size)) + (6*var(--border-size)));
  }
  
  /* container */
  #container {
    /* position */
    position: absolute;
    margin: auto;
    top: calc(var(--tab-height) + var(--padding-size));
    right: 0;
    bottom: 0;
    left: 0;
    
    /* size */
    width: calc(var(--sidebar-width) + (4*var(--book-width)) + 8*var(--padding-size) + 13*var(--border-size));
    height: var(--container-height);
  }
  
  /* sidebar */
  #sidebar {
    /* position */
    float: left;
    margin: 0px var(--padding-size) 0px 0px;
    
    /* size */
    width: calc(var(--sidebar-width) + (2*var(--border-size)));
    height: calc(var(--container-height) + (2*var(--border-size)));
    
    /* overflow */
    overflow-y: hidden;
  }
  
  /* container for [yearly] reading challenge */
  #gr_challenge_outer {
    /* position */
    position: relative;
    padding: var(--padding-size);
  
    /* size */
    width: calc(var(--sidebar-width) - (2*var(--padding-size)));
    height: calc(95px + 2*var(--border-size));
    
    /* border */
    border: var(--border-style);
    
    /* color */
    background-color: var(--background-boxes-color);
  }
  
  /* links */
  #links {
  	/* position */
    position: relative;
    margin-top: var(--padding-size);
  
    /* size */
    height: calc(3*var(--padding-size));
    
    /* text */
    line-height: calc(2*var(--padding-size));
  }
  
  /* outer container for description */
  #description_outer {
  	/* border */
    border: var(--border-style);
    
    /* color */
    background-color: var(--background-boxes-color);
  }
  
  /* inner container for description
   *
   * allows for dynamic height (will become scrollable
   * if maximum height is reached)
   */
  #description_inner {
    /* size */
    /* (container height) - (reading challenge height) - (links height) - 4*(padding size) - 4*(border size) */
    max-height: calc(var(--container-height) - 95px - 42px - (4*var(--padding-size)) - (4*var(--border-size)));
    
    /* padding */
    padding: var(--padding-size);
    
    /* overflow */
    overflow-y: auto;
  }
  
  /* outer container for bookshelf (tab navigation)
   */
  #bookshelf_outer {
    /* position */
    position: relative;
    float: left;
    
    /* size */
    width: calc((4*var(--book-width)) + 6*var(--padding-size) + 8*var(--border-size));
    height: var(--container-height);
    
    /* border */
    border: var(--border-style);
    
    /* color */
    background-color: var(--background-boxes-color);
  }
  
  /* inner container for bookshelf (tab panels)
   */
  .bookshelf_inner {
    /* size */
    height: calc(var(--container-height) - 2*var(--padding-size));
    
    /* border */
    padding-top: var(--padding-size);
    padding-bottom: var(--padding-size);
    border-right: var(--border-style);
    
    /* overflow */
    overflow-y: scroll;
  }
  
</style>

<script>

  /* FakeScroll */
  document.querySelector('#scroll_1').fakeScroll({track: "smooth"});
  document.querySelector('#scroll_2').fakeScroll({track: "smooth"});
  document.querySelector('#scroll_3').fakeScroll({track: "smooth"});
  document.querySelector('#scroll_4').fakeScroll({track: "smooth"});
  
  
  /* jQuery UI */
  $(document).ready(function() {
  
    /* make sure images of bookshelf have default filter */
    $('.gr_grid_container img').addClass('img_default');
    
    /* make sure tab navigation links load smoothly */
    $('#bookshelf_outer').removeAttr('style');
    
    /* set first tab as active */
    $('li').first().addClass('active');
    
    /* get background and accent colors */
    var computedStyle = getComputedStyle(document.documentElement);
    var inactiveBG = computedStyle.getPropertyValue('--background-color');
    var activeBG = computedStyle.getPropertyValue('--accent-color');
    
    /* create fade time variable */
    var fadeTime = 750;
    
    
    /* crossfade tab content */
    $('#bookshelf_outer').tabs({
      /* fade out old panel */
      hide: fadeTime,
      beforeActivate: function(event, ui) {
        /* fade in new panel */
        ui.newPanel.css('zIndex', 1).fadeIn(fadeTime, function() {
          $(this).css('zIndex', '');
        });
        
        /* fade out old tab */
        ui.oldTab.fadeIn(fadeTime, function() {
          $(this).removeClass('active');
          $(this).css('color', activeBG);
        });
        
        /* fade in new tab */
        ui.newTab.fadeIn(fadeTime, function() {
          $(this).addClass('active');
          $(this).css('color', inactiveBG);
        });
        
      }
    });
    
  });
  
</script>
